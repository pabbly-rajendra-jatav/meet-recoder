<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Google Meet Recorder</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body>
  <div class="container">
    <!-- Header -->
    <div class="header">
      <div class="header-left">
        <div class="meet-logo">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
            <path d="M14.5 11L17 8.5V15.5L14.5 13V15C14.5 15.55 14.05 16 13.5 16H7C6.45 16 6 15.55 6 15V9C6 8.45 6.45 8 7 8H13.5C14.05 8 14.5 8.45 14.5 9V11Z" fill="#6366f1"/>
          </svg>
        </div>
        <div>
          <h1>Meet Recorder</h1>
          <span id="status-badge" class="badge badge-idle">Ready</span>
        </div>
      </div>
      <button id="settings-btn" class="icon-btn" title="Settings">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
          <path d="M19.14 12.94c.04-.3.06-.61.06-.94 0-.32-.02-.64-.07-.94l2.03-1.58a.49.49 0 0 0 .12-.61l-1.92-3.32a.49.49 0 0 0-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54a.484.484 0 0 0-.48-.41h-3.84c-.24 0-.43.17-.47.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96c-.22-.08-.47 0-.59.22L2.74 8.87c-.12.21-.08.47.12.61l2.03 1.58c-.05.3-.07.62-.07.94s.02.64.07.94l-2.03 1.58a.49.49 0 0 0-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .44-.17.47-.41l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.22.07-.47-.12-.61l-2.01-1.58zM12 15.6A3.6 3.6 0 1 1 12 8.4a3.6 3.6 0 0 1 0 7.2z"/>
        </svg>
      </button>
    </div>

    <!-- Not on Meet Warning -->
    <div id="not-on-meet" class="warning" style="display: none;">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z"/></svg>
      <span>Open a Google Meet tab to start recording</span>
    </div>

    <!-- Recording Info Panel -->
    <div id="recording-info" class="info-panel" style="display: none;">
      <div class="timer-section">
        <div class="rec-indicator">
          <span class="rec-dot"></span>
          <span>REC</span>
        </div>
        <span id="timer" class="timer">00:00:00</span>
      </div>
      <div class="info-meta">
        <div class="info-chip">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M20 6H12l-2-2H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V8c0-1.1-.9-2-2-2z"/></svg>
          <span id="file-size">0 MB</span>
        </div>
        <div class="info-chip">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M17 10.5V7c0-.55-.45-1-1-1H4c-.55 0-1 .45-1 1v10c0 .55.45 1 1 1h12c.55 0 1-.45 1-1v-3.5l4 4v-11l-4 4z"/></svg>
          <span id="current-quality">480p</span>
        </div>
      </div>
    </div>

    <!-- Quality Selector (shown when idle) -->
    <div id="quality-selector" class="quality-selector">
      <label for="quality">Recording Quality</label>
      <select id="quality">
        <option value="low">Low (Audio only, ~30 MB/hr)</option>
        <option value="medium" selected>Medium (480p)</option>
        <option value="high">High (720p)</option>
        <option value="ultra">Ultra (1080p)</option>
      </select>
    </div>

    <!-- Action Button -->
    <button id="record-btn" class="btn btn-start">
      <svg id="record-icon" width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
        <circle cx="12" cy="12" r="8"/>
      </svg>
      <span id="record-btn-text">Start Recording</span>
    </button>
  </div>
</body>
</html>
