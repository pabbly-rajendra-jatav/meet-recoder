<script>
  // Auto-download PNGs
  window.onload = () => {
    
    setTimeout(() => {
      const canvas = document.getElementById('c16');
      const link = document.createElement('a');
      link.download = 'icon16.png';
      link.href = canvas.toDataURL('image/png');
