<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Meet Recorder — Recording</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', -apple-system, sans-serif;
      background: #0f172a; color: #fff;
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      user-select: none;
    }
    .container {
      text-align: center;
    }
    .row {
      display: flex; align-items: center; justify-content: center; gap: 12px;
    }
    .dot {
      width: 14px; height: 14px; border-radius: 50%; background: #ef4444;
      animation: pulse 1.5s ease-in-out infinite;
    }
    @keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:0.3; } }
    .timer { font-size: 48px; font-weight: 700; font-variant-numeric: tabular-nums; }
    .status { font-size: 14px; color: #94a3b8; margin-top: 12px; }
    .mic-ok { color: #4ade80; }
    .mic-fail { color: #f87171; }
    #mic-btn {
      display: none; margin-top: 16px; padding: 10px 24px;
      background: #4f46e5; color: #fff; border: none; border-radius: 10px;
      font-size: 14px; font-weight: 600; cursor: pointer; font-family: inherit;
    }
    #mic-btn:hover { background: #4338ca; }
    .hint {
      font-size: 12px; color: #475569; margin-top: 20px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="row">
      <div class="dot"></div>
      <div class="timer" id="timer">00:00</div>
    </div>
    <div class="status" id="status">Starting...</div>
    <button id="mic-btn">Allow Microphone</button>
    <div class="hint">Do not close this tab while recording</div>
  </div>
</body>
</html>
